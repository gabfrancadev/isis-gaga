<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ísis</title>
    <!-- Google Fonts for a cute, modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --primary-color: #ff9a9e;
            --secondary-color: #fecfef;
            --text-color: #4a4a4a;
            --btn-yes-bg: #a8edea;
            --btn-yes-hover: #7be0dc;
            --btn-no-bg: #fbc2eb;
            --btn-no-hover: #f9a8d4;
            --error-color: #ff758c;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            background-image: linear-gradient(to top, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            overflow: hidden; /* For animations */
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        .card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .kitten-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid white;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .kitten-img:hover {
            transform: scale(1.05) rotate(3deg);
        }

        h1.question {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 30px;
            line-height: 1.4;
            color: #ff758c;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .btn {
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 800;
            font-family: inherit;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            color: #fff;
        }

        .btn-yes {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #555;
        }

        .btn-yes:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.15);
            background: linear-gradient(135deg, #9ae6e2 0%, #fccadd 100%);
        }

        .btn-yes:active {
            transform: translateY(2px);
        }

        .btn-no {
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            color: #555;
            position: relative;
        }

        .btn-no:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.15);
        }

        .error-msg {
            color: var(--error-color);
            font-weight: 600;
            font-size: 1.1rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .error-msg.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.6s cubic-bezier(.36,.07,.19,.97) both;
        }

        /* Success Screen */
        .success-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .success-screen.show {
            opacity: 1;
            pointer-events: auto;
        }

        .success-msg {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ff758c;
            text-align: center;
            margin-bottom: 40px;
            padding: 0 20px;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .floating-cats {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 110;
        }

        .floating-cat {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 4px solid #fff;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            h1.question {
                font-size: 1.5rem;
            }
            .btn {
                padding: 12px 30px;
                font-size: 1.1rem;
            }
            .success-msg {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card" id="main-card">
            <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Gatinho Fofo" class="kitten-img">
            <h1 class="question">Ísis, você quer ver Gaga hoje antes de viajar?</h1>
            <div class="buttons">
                <button class="btn btn-yes" id="btn-yes">Sim</button>
                <button class="btn btn-no" id="btn-no">Não</button>
            </div>
            <p class="error-msg" id="error-msg">Resposta errada, tente novamente 😿</p>
        </div>
    </div>

    <div class="success-screen" id="success-screen">
        <h1 class="success-msg" id="success-msg">Yay! Então vamos ver Gaga! 🐾</h1>
    </div>

    <div class="floating-cats" id="floating-cats"></div>

    <script>
        const btnYes = document.getElementById('btn-yes');
        const btnNo = document.getElementById('btn-no');
        const errorMsg = document.getElementById('error-msg');
        const mainCard = document.getElementById('main-card');
        const successScreen = document.getElementById('success-screen');
        const floatingCatsContainer = document.getElementById('floating-cats');

        const catImages = [
            "https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=200&q=80",
            "https://images.unsplash.com/photo-1573865526739-10659fec78a5?auto=format&fit=crop&w=200&q=80",
            "https://images.unsplash.com/photo-1495360010541-f48722b34f7d?auto=format&fit=crop&w=200&q=80",
            "https://images.unsplash.com/photo-1533738363-b7f9aef128ce?auto=format&fit=crop&w=200&q=80",
            "https://images.unsplash.com/photo-1592194996308-7b43878e84a6?auto=format&fit=crop&w=200&q=80"
        ];

        btnNo.addEventListener('click', () => {
            // Show error message
            errorMsg.classList.add('show');
            
            // Add shake animation
            mainCard.classList.remove('shake');
            void mainCard.offsetWidth; // trigger reflow
            mainCard.classList.add('shake');

            // Optionally, make the "No" button run away!
            const randomX = Math.floor(Math.random() * 100) - 50;
            const randomY = Math.floor(Math.random() * 50) - 25;
            btnNo.style.transform = `translate(${randomX}px, ${randomY}px)`;
        });

        btnYes.addEventListener('click', () => {
            // Hide main container visually
            document.querySelector('.container').style.display = 'none';
            
            // Show success screen
            successScreen.classList.add('show');

            // Fire confetti
            fireConfetti();

            // Spawn floating cats
            spawnCats();
        });

        function fireConfetti() {
            var duration = 3000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff9a9e', '#fecfef', '#a8edea']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff9a9e', '#fecfef', '#a8edea']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function spawnCats() {
            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    const cat = document.createElement('img');
                    cat.src = catImages[Math.floor(Math.random() * catImages.length)];
                    cat.classList.add('floating-cat');
                    
                    // Random positions
                    cat.style.left = Math.random() * 90 + 'vw';
                    cat.style.top = Math.random() * 90 + 'vh';
                    
                    // Random sizes and animation delay
                    const size = Math.random() * 80 + 100; // 100px to 180px
                    cat.style.width = size + 'px';
                    cat.style.height = size + 'px';
                    cat.style.animationDelay = Math.random() * 2 + 's';
                    
                    floatingCatsContainer.appendChild(cat);
                }, i * 200);
            }
        }
    </script>
</body>
</html>
